#spring.application.name=api-gateway
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://config-server-plan-management
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server-plan-management
      username: ${CONFIG_USERNAME}
      password: ${CONFIG_PASS}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB
      location: /tmp
